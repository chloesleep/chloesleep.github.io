<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classpect Randomizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e14;
      --surface: #181825;
      --border:  #2a2a3a;
      --accent:  #9b59b6;
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --purple:  #cba6f7;
      --error:   #f38ba8;
    }

    /* ── Upload row ── */
    .upload-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
    }

    .btn-upload {
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.28rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-upload:hover { color: var(--purple); border-color: var(--accent); }

    .upload-filename {
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Count input ── */
    .count-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.3rem 0.5rem;
      width: 62px;
      text-align: center;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"]:focus { outline: none; border-color: var(--accent); }

    /* ── Multi-result grid ── */
    .result-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .result-pill {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 1rem;
      font-weight: bold;
      color: var(--purple);
      letter-spacing: 0.5px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
      gap: 1.5rem;
    }

    /* ── Header ── */
    header { text-align: center; }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple);
      text-shadow: 0 0 35px #7b2d8b55;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 2px;
      margin-top: 0.35rem;
    }

    /* ── Lists ── */
    .lists-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 760px;
      flex-wrap: wrap;
    }

    .list-card {
      flex: 1;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--purple);
      margin-bottom: 0.6rem;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.6rem;
      resize: vertical;
      min-height: 210px;
      line-height: 1.75;
      transition: border-color 0.15s;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Connector ── */
    .connector-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .connector-row code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.78rem;
      color: var(--purple);
    }

    .connector-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.3rem 0.6rem;
      width: 80px;
      text-align: center;
      transition: border-color 0.15s;
    }

    .connector-row input:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; }

    button {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.7rem 1.75rem;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-generate { background: var(--accent); color: #fff; }
    .btn-generate:hover { background: #b06adf; box-shadow: 0 0 22px #7b2d8b55; }
    .btn-generate:active { transform: scale(0.96); }
    .btn-generate:disabled {
      background: #2e2e3e;
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { color: var(--error); border-color: #553333; }
    .btn-reset:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result ── */
    .result-card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .result-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    #result {
      font-size: 1.9rem;
      font-weight: bold;
      color: var(--purple);
      text-shadow: 0 0 25px #7b2d8b44;
      letter-spacing: 1px;
      min-height: 2.6rem;
    }

    #result.placeholder { color: #35354a; font-weight: normal; font-size: 1rem; }
    #result.error       { color: var(--error); font-weight: normal; font-size: 1rem; }

    .stats {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .stats strong { color: var(--text); }

    /* ── History ── */
    .history-card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .history-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .history-count {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .history-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-grid::-webkit-scrollbar { width: 4px; }
    .history-grid::-webkit-scrollbar-track { background: transparent; }
    .history-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.55rem;
      font-size: 0.78rem;
      color: #a6adc8;
    }

    .history-placeholder {
      color: #35354a;
      font-size: 0.82rem;
      font-style: italic;
    }

    /* ── Animations ── */
    @keyframes pop {
      0%   { transform: scale(0.88); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop { animation: pop 0.22s ease-out forwards; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* 'both' fill-mode keeps opacity:0 during the stagger delay */
    .fadein { animation: fadein 0.2s ease-out both; }
  </style>
</head>
<body>

<header>
  <h1>Classpect Randomizer</h1>
  <p class="subtitle">no repeats &middot; persists between sessions</p>
</header>

<!-- Lists -->
<div class="lists-row">
  <div class="list-card">
    <div class="card-title">List 1 &mdash; Classes</div>
    <textarea id="list1" spellcheck="false" placeholder="One item per line...">Heir
Seer
Page
Knight
Witch
Mage
Maid
Bard
Prince
Rogue
Thief
Sylph
Muse
Lord</textarea>
    <div class="upload-row">
      <input type="file" id="file1" accept=".txt" style="display:none" onchange="loadFile('list1','fname1',this)">
      <button class="btn-upload" onclick="document.getElementById('file1').click()">&#x1F4C2; Upload .txt</button>
      <span class="upload-filename" id="fname1"></span>
    </div>
  </div>
  <div class="list-card">
    <div class="card-title">List 2 &mdash; Aspects</div>
    <textarea id="list2" spellcheck="false" placeholder="One item per line...">Heart
Mind
Breath
Blood
Life
Doom
Light
Void
Time
Space
Hope
Rage</textarea>
    <div class="upload-row">
      <input type="file" id="file2" accept=".txt" style="display:none" onchange="loadFile('list2','fname2',this)">
      <button class="btn-upload" onclick="document.getElementById('file2').click()">&#x1F4C2; Upload .txt</button>
      <span class="upload-filename" id="fname2"></span>
    </div>
  </div>
</div>

<!-- Connector format -->
<div class="connector-row">
  <span>Format:</span>
  <code>[List 1]</code>
  <input type="text" id="connector" value=" of " title="Connector between the two items" />
  <code>[List 2]</code>
</div>

<!-- Count -->
<div class="count-row">
  <span>Generate</span>
  <input type="number" id="count" value="1" min="1" max="999" title="How many combos to generate at once" />
  <span>at a time</span>
</div>

<!-- Controls -->
<div class="btn-row">
  <button class="btn-generate" id="btn-generate" onclick="generate()">Randomize</button>
  <button class="btn-reset"    id="btn-reset"    onclick="resetUsed()">Reset Used</button>
</div>

<!-- Result display -->
<div class="result-card">
  <div class="result-label" id="result-label">Result</div>
  <div id="result-wrap">
    <div id="result" class="placeholder">press randomize to begin</div>
  </div>
  <div class="stats">
    <span>Used: <strong id="s-used">0</strong></span>
    <span>Remaining: <strong id="s-remaining">—</strong></span>
    <span>Total possible: <strong id="s-total">—</strong></span>
  </div>
</div>

<!-- Used combinations log -->
<div class="history-card">
  <div class="history-header">
    <div class="history-title">Used Combinations</div>
    <div class="history-count" id="history-count"></div>
  </div>
  <div class="history-grid" id="history-grid">
    <span class="history-placeholder">none yet.</span>
  </div>
</div>

<script>
  const KEYS = {
    used:      'classpect_used_v1',
    list1:     'classpect_list1',
    list2:     'classpect_list2',
    connector: 'classpect_connector',
    count:     'classpect_count',
  };

  // ── State ──────────────────────────────────────────────
  let usedCombos = new Set(JSON.parse(localStorage.getItem(KEYS.used) || '[]'));

  // ── Init: restore saved lists/connector/count if present ─
  function loadSaved() {
    const l1 = localStorage.getItem(KEYS.list1);
    const l2 = localStorage.getItem(KEYS.list2);
    const cn = localStorage.getItem(KEYS.connector);
    const ct = localStorage.getItem(KEYS.count);
    if (l1 !== null) document.getElementById('list1').value = l1;
    if (l2 !== null) document.getElementById('list2').value = l2;
    if (cn !== null) document.getElementById('connector').value = cn;
    if (ct !== null) document.getElementById('count').value = ct;
  }

  // ── Helpers ────────────────────────────────────────────
  function getList(id) {
    return document.getElementById(id).value
      .split('\n')
      .map(s => s.trim())
      .filter(Boolean);
  }

  function getConnector() {
    return document.getElementById('connector').value;
  }

  function getCount() {
    return Math.max(1, parseInt(document.getElementById('count').value) || 1);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getAllCombos() {
    const l1 = getList('list1');
    const l2 = getList('list2');
    const c  = getConnector();
    const out = [];
    for (const a of l1)
      for (const b of l2)
        out.push(a + c + b);
    return out;
  }

  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Persistence ────────────────────────────────────────
  function saveUsed() {
    localStorage.setItem(KEYS.used, JSON.stringify([...usedCombos]));
  }

  // ── File upload ────────────────────────────────────────
  function loadFile(listId, fnameId, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result.trim();
      document.getElementById(listId).value = text;
      localStorage.setItem(KEYS[listId], text);
      document.getElementById(fnameId).textContent = file.name;
      updateStats();
    };
    reader.readAsText(file);
    input.value = ''; // allow re-uploading same file name
  }

  // ── Result display ─────────────────────────────────────
  // state: 'placeholder' | 'error' | null (normal generation)
  function showResult(picks, state) {
    const wrap  = document.getElementById('result-wrap');
    const label = document.getElementById('result-label');

    if (state === 'placeholder' || state === 'error') {
      label.textContent = 'Result';
      wrap.innerHTML = `<div id="result" class="${state}">${esc(picks[0])}</div>`;
      return;
    }

    if (picks.length === 1) {
      label.textContent = 'Result';
      wrap.innerHTML = '<div id="result"></div>';
      const r = wrap.querySelector('#result');
      void r.offsetWidth;
      r.textContent = picks[0];
      r.className = 'pop';
    } else {
      label.textContent = `Results (${picks.length})`;
      wrap.innerHTML = `<div class="result-grid">${
        picks.map((c, i) =>
          `<span class="result-pill fadein" style="animation-delay:${i * 0.05}s">${esc(c)}</span>`
        ).join('')
      }</div>`;
    }
  }

  // ── UI updates ─────────────────────────────────────────
  function updateStats() {
    const all       = getAllCombos();
    const total     = all.length;
    const remaining = all.filter(c => !usedCombos.has(c)).length;
    const used      = usedCombos.size;

    document.getElementById('s-used').textContent      = used;
    document.getElementById('s-remaining').textContent = remaining;
    document.getElementById('s-total').textContent     = total;

    const exhausted = total > 0 && remaining === 0;
    document.getElementById('btn-generate').disabled = exhausted;
    document.getElementById('btn-reset').disabled    = used === 0;
  }

  function updateHistory() {
    const grid = document.getElementById('history-grid');
    const countEl = document.getElementById('history-count');

    if (usedCombos.size === 0) {
      grid.innerHTML = '<span class="history-placeholder">none yet.</span>';
      countEl.textContent = '';
      return;
    }

    const items = [...usedCombos].reverse(); // most recent first
    grid.innerHTML = items
      .map(c => `<span class="history-tag">${esc(c)}</span>`)
      .join('');
    countEl.textContent = `${items.length} combo${items.length !== 1 ? 's' : ''}`;
  }

  // ── Actions ────────────────────────────────────────────
  function generate() {
    const all       = getAllCombos();
    const available = all.filter(c => !usedCombos.has(c));

    if (all.length === 0) {
      showResult(['add items to both lists first!'], 'error');
      return;
    }

    if (available.length === 0) {
      showResult(['all combinations used — reset to start over!'], 'error');
      updateStats();
      return;
    }

    // Pick min(requested, available) unique combos via Fisher-Yates
    const n     = Math.min(getCount(), available.length);
    const picks = shuffle(available).slice(0, n);

    picks.forEach(c => usedCombos.add(c));
    saveUsed();

    showResult(picks, null);
    updateStats();
    updateHistory();
  }

  function resetUsed() {
    if (usedCombos.size === 0) return;
    if (!confirm(`Clear all ${usedCombos.size} used combination(s) and start fresh?`)) return;

    usedCombos.clear();
    saveUsed();

    showResult(['press randomize to begin'], 'placeholder');
    updateStats();
    updateHistory();
  }

  // ── Wire up list/connector changes ─────────────────────
  ['list1', 'list2'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      localStorage.setItem(KEYS[id], document.getElementById(id).value);
      updateStats();
    });
  });

  document.getElementById('connector').addEventListener('input', () => {
    localStorage.setItem(KEYS.connector, document.getElementById('connector').value);
    updateStats();
  });

  document.getElementById('count').addEventListener('input', () => {
    localStorage.setItem(KEYS.count, document.getElementById('count').value);
  });

  // ── Boot ───────────────────────────────────────────────
  loadSaved();
  updateStats();
  updateHistory();
</script>
</body>
</html>
