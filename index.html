<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classpect Randomizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e14;
      --surface: #181825;
      --border:  #2a2a3a;
      --accent:  #9b59b6;
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --purple:  #cba6f7;
      --error:   #f38ba8;
    }

    /* ── Upload row ── */
    .upload-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
    }

    .btn-upload {
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.28rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-upload:hover { color: var(--purple); border-color: var(--accent); }

    .upload-filename {
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Count input ── */
    .count-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.3rem 0.5rem;
      width: 62px;
      text-align: center;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"]:focus { outline: none; border-color: var(--accent); }

    /* ── Multi-result grid ── */
    .result-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .result-pill {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 1rem;
      font-weight: bold;
      color: var(--purple);
      letter-spacing: 0.5px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 4rem;
      gap: 1.5rem;
    }

    /* ── Header ── */
    header { text-align: center; }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple);
      text-shadow: 0 0 35px #7b2d8b55;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 2px;
      margin-top: 0.35rem;
    }

    /* ── Lists ── */
    .lists-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 760px;
      flex-wrap: wrap;
    }

    .list-card {
      flex: 1;
      min-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--purple);
      margin-bottom: 0.6rem;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.6rem;
      resize: vertical;
      min-height: 210px;
      line-height: 1.75;
      transition: border-color 0.15s;
    }

    textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Connector ── */
    .connector-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .connector-row code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.78rem;
      color: var(--purple);
    }

    .connector-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.3rem 0.6rem;
      width: 80px;
      text-align: center;
      transition: border-color 0.15s;
    }

    .connector-row input:focus { outline: none; border-color: var(--accent); }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 0.75rem; }

    button {
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.7rem 1.75rem;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-generate { background: var(--accent); color: #fff; }
    .btn-generate:hover { background: #b06adf; box-shadow: 0 0 22px #7b2d8b55; }
    .btn-generate:active { transform: scale(0.96); }
    .btn-generate:disabled {
      background: #2e2e3e;
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { color: var(--error); border-color: #553333; }
    .btn-reset:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result ── */
    .result-card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .result-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    #result {
      font-size: 1.9rem;
      font-weight: bold;
      color: var(--purple);
      text-shadow: 0 0 25px #7b2d8b44;
      letter-spacing: 1px;
      min-height: 2.6rem;
    }

    #result.placeholder { color: #35354a; font-weight: normal; font-size: 1rem; }
    #result.error       { color: var(--error); font-weight: normal; font-size: 1rem; }

    .stats {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .stats strong { color: var(--text); }

    /* ── History ── */
    .history-card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .history-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .history-count {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .history-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-grid::-webkit-scrollbar { width: 4px; }
    .history-grid::-webkit-scrollbar-track { background: transparent; }
    .history-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.55rem;
      font-size: 0.78rem;
      color: #a6adc8;
    }

    .history-placeholder {
      color: #35354a;
      font-size: 0.82rem;
      font-style: italic;
    }

    /* ── Animations ── */
    @keyframes pop {
      0%   { transform: scale(0.88); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop { animation: pop 0.22s ease-out forwards; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* 'both' fill-mode keeps opacity:0 during the stagger delay */
    .fadein { animation: fadein 0.2s ease-out both; }

    /* ── Session bar ── */
    #session-bar {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .session-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      flex-shrink: 0;
    }

    #session-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.28rem 0.55rem;
      flex: 1;
      min-width: 100px;
      max-width: 220px;
      transition: border-color 0.15s;
    }
    #session-select:focus { outline: none; border-color: var(--accent); }

    .btn-session {
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.28rem 0.65rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-session:hover { color: var(--purple); border-color: var(--accent); }
    .btn-session.danger:hover { color: var(--error); border-color: #553333; }
    .btn-session:disabled,
    .btn-session:disabled:hover { opacity: 0.35; cursor: not-allowed; color: var(--muted); border-color: var(--border); }

    /* ── Repeat toggles ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .toggle-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      flex-shrink: 0;
    }
    .toggle-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      color: var(--text);
      user-select: none;
    }
    .toggle-item input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Session bar -->
<div id="session-bar">
  <span class="session-label">Session:</span>
  <select id="session-select" onchange="switchSession(this.value)"></select>
  <button class="btn-session" onclick="newSession()">+ New</button>
  <button class="btn-session" onclick="renameSession()">Rename</button>
  <button class="btn-session danger" id="btn-delete-session" onclick="deleteSession()">Delete</button>
</div>

<header>
  <h1>Classpect Randomizer</h1>
  <p class="subtitle">configurable repeat rules &middot; multiple sessions</p>
</header>

<!-- Lists -->
<div class="lists-row">
  <div class="list-card">
    <div class="card-title">List 1 &mdash; Classes</div>
    <textarea id="list1" spellcheck="false" placeholder="One item per line...">Heir
Seer
Page
Knight
Witch
Mage
Maid
Bard
Prince
Rogue
Thief
Sylph
Muse
Lord</textarea>
    <div class="upload-row">
      <input type="file" id="file1" accept=".txt" style="display:none" onchange="loadFile('list1','fname1',this)">
      <button class="btn-upload" onclick="document.getElementById('file1').click()">&#x1F4C2; Upload .txt</button>
      <span class="upload-filename" id="fname1"></span>
    </div>
  </div>
  <div class="list-card">
    <div class="card-title">List 2 &mdash; Aspects</div>
    <textarea id="list2" spellcheck="false" placeholder="One item per line...">Heart
Mind
Breath
Blood
Life
Doom
Light
Void
Time
Space
Hope
Rage</textarea>
    <div class="upload-row">
      <input type="file" id="file2" accept=".txt" style="display:none" onchange="loadFile('list2','fname2',this)">
      <button class="btn-upload" onclick="document.getElementById('file2').click()">&#x1F4C2; Upload .txt</button>
      <span class="upload-filename" id="fname2"></span>
    </div>
  </div>
</div>

<!-- Connector format -->
<div class="connector-row">
  <span>Format:</span>
  <code>[List 1]</code>
  <input type="text" id="connector" value=" of " title="Connector between the two items" />
  <code>[List 2]</code>
</div>

<!-- Count -->
<div class="count-row">
  <span>Generate</span>
  <input type="number" id="count" value="1" min="1" max="999" title="How many combos to generate at once" />
  <span>at a time</span>
</div>

<!-- Repeat rules -->
<div class="toggle-row">
  <span class="toggle-label">No repeat:</span>
  <label class="toggle-item"><input type="checkbox" id="tog-aspects" onchange="onToggleChange()"> Aspects</label>
  <label class="toggle-item"><input type="checkbox" id="tog-classes" onchange="onToggleChange()"> Classes</label>
</div>

<!-- Controls -->
<div class="btn-row">
  <button class="btn-generate" id="btn-generate" onclick="generate()">Randomize</button>
  <button class="btn-reset"    id="btn-reset"    onclick="resetUsed()">Reset Used</button>
</div>

<!-- Result display -->
<div class="result-card">
  <div class="result-label" id="result-label">Result</div>
  <div id="result-wrap">
    <div id="result" class="placeholder">press randomize to begin</div>
  </div>
  <div class="stats">
    <span id="stat-aspects">Aspects: <strong id="s-used-a">0</strong>/<strong id="s-total-a">0</strong></span>
    <span id="stat-classes">Classes: <strong id="s-used-c">0</strong>/<strong id="s-total-c">0</strong></span>
    <span>Remaining: <strong id="s-remaining">—</strong></span>
  </div>
</div>

<!-- Used combinations log -->
<div class="history-card">
  <div class="history-header">
    <div class="history-title">Session Results</div>
    <div class="history-count" id="history-count"></div>
  </div>
  <div class="history-grid" id="history-grid">
    <span class="history-placeholder">none yet.</span>
  </div>
</div>

<script>
  // ── Storage keys ───────────────────────────────────────
  const KEYS = {
    sessions:  'classpect_sessions_v1',
    list1:     'classpect_list1',
    list2:     'classpect_list2',
    connector: 'classpect_connector',
    count:     'classpect_count',
  };

  // ── Sessions state ───────────────────────────────────
  // Each session: { name, noRepeatAspects, noRepeatClasses, usedAspects: string[], usedClasses: string[], history: string[] }
  let sessionsData = {
    current: 'Session 1',
    list: [{ name: 'Session 1', noRepeatAspects: true, noRepeatClasses: false, usedAspects: [], usedClasses: [], history: [] }]
  };

  function getCurrentSession() {
    const s = sessionsData.list.find(s => s.name === sessionsData.current) || sessionsData.list[0];
    // Provide defaults for sessions saved before these fields existed
    if (s.noRepeatAspects === undefined) s.noRepeatAspects = true;
    if (s.noRepeatClasses === undefined) s.noRepeatClasses = false;
    if (!s.usedClasses) s.usedClasses = [];
    return s;
  }

  function saveSessions() {
    localStorage.setItem(KEYS.sessions, JSON.stringify(sessionsData));
  }

  function loadSessions() {
    const saved = localStorage.getItem(KEYS.sessions);
    if (saved) { try { sessionsData = JSON.parse(saved); } catch(e) {} }
  }

  // ── Init: restore saved lists / connector / count ────────
  function loadSettings() {
    const l1 = localStorage.getItem(KEYS.list1);
    const l2 = localStorage.getItem(KEYS.list2);
    const cn = localStorage.getItem(KEYS.connector);
    const ct = localStorage.getItem(KEYS.count);
    if (l1 !== null) document.getElementById('list1').value = l1;
    if (l2 !== null) document.getElementById('list2').value = l2;
    if (cn !== null) document.getElementById('connector').value = cn;
    if (ct !== null) document.getElementById('count').value = ct;
  }

  // ── Helpers ─────────────────────────────────────────
  function getList(id) {
    return document.getElementById(id).value
      .split('\n').map(s => s.trim()).filter(Boolean);
  }
  function getConnector() { return document.getElementById('connector').value; }
  function getCount() {
    return Math.max(1, parseInt(document.getElementById('count').value) || 1);
  }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── File upload ─────────────────────────────────────
  function loadFile(listId, fnameId, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result.trim();
      document.getElementById(listId).value = text;
      localStorage.setItem(KEYS[listId], text);
      document.getElementById(fnameId).textContent = file.name;
      updateStats();
    };
    reader.readAsText(file);
    input.value = '';
  }

  // ── Result display ───────────────────────────────────
  function showResult(picks, state) {
    const wrap  = document.getElementById('result-wrap');
    const label = document.getElementById('result-label');
    if (state === 'placeholder' || state === 'error') {
      label.textContent = 'Result';
      wrap.innerHTML = `<div id="result" class="${state}">${esc(picks[0])}</div>`;
      return;
    }
    if (picks.length === 1) {
      label.textContent = 'Result';
      wrap.innerHTML = '<div id="result"></div>';
      const r = wrap.querySelector('#result');
      void r.offsetWidth;
      r.textContent = picks[0];
      r.className = 'pop';
    } else {
      label.textContent = `Results (${picks.length})`;
      wrap.innerHTML = `<div class="result-grid">${
        picks.map((c, i) =>
          `<span class="result-pill fadein" style="animation-delay:${i * 0.05}s">${esc(c)}</span>`
        ).join('')
      }</div>`;
    }
  }

  // ── UI updates ─────────────────────────────────────
  function updateStats() {
    const l1 = getList('list1');
    const l2 = getList('list2');
    const s  = getCurrentSession();
    const noA = s.noRepeatAspects !== false;
    const noC = s.noRepeatClasses === true;

    const usedA = s.usedAspects.length;
    const usedC = s.usedClasses.length;
    const remA  = Math.max(0, l2.length - usedA);
    const remC  = Math.max(0, l1.length - usedC);

    const statA = document.getElementById('stat-aspects');
    const statC = document.getElementById('stat-classes');
    statA.style.display = noA ? '' : 'none';
    statC.style.display = noC ? '' : 'none';

    if (noA) {
      document.getElementById('s-used-a').textContent  = usedA;
      document.getElementById('s-total-a').textContent = l2.length;
    }
    if (noC) {
      document.getElementById('s-used-c').textContent  = usedC;
      document.getElementById('s-total-c').textContent = l1.length;
    }

    let remaining;
    if      (!noA && !noC) remaining = '∞';
    else if (noA  && noC)  remaining = Math.min(remA, remC);
    else if (noA)          remaining = remA;
    else                   remaining = remC;

    document.getElementById('s-remaining').textContent = remaining;

    const exhausted = (noA || noC) && remaining === 0;
    document.getElementById('btn-generate').disabled = exhausted;
    document.getElementById('btn-reset').disabled    = s.history.length === 0;
  }

  function updateHistory() {
    const grid    = document.getElementById('history-grid');
    const countEl = document.getElementById('history-count');
    const session = getCurrentSession();

    if (session.history.length === 0) {
      grid.innerHTML = '<span class="history-placeholder">none yet.</span>';
      countEl.textContent = '';
      return;
    }
    const items = [...session.history].reverse();
    grid.innerHTML = items.map(c => `<span class="history-tag">${esc(c)}</span>`).join('');
    countEl.textContent = `${session.history.length} result${session.history.length !== 1 ? 's' : ''}`;
  }

  // ── Session management ─────────────────────────────
  function renderSessionSelect() {
    const sel = document.getElementById('session-select');
    sel.innerHTML = sessionsData.list
      .map(s => `<option value="${esc(s.name)}"
        ${s.name === sessionsData.current ? ' selected' : ''}>${esc(s.name)}</option>`)
      .join('');
    document.getElementById('btn-delete-session').disabled = sessionsData.list.length <= 1;
  }

  function switchSession(name) {
    sessionsData.current = name;
    saveSessions();
    syncToggles();
    showResult(['press randomize to begin'], 'placeholder');
    updateStats();
    updateHistory();
  }

  function newSession() {
    const name = prompt('New session name:', `Session ${sessionsData.list.length + 1}`);
    if (!name || !name.trim()) return;
    const trimmed = name.trim();
    if (sessionsData.list.some(s => s.name === trimmed)) {
      alert(`A session named "${trimmed}" already exists.`); return;
    }
    const cur = getCurrentSession();
    sessionsData.list.push({
      name: trimmed,
      noRepeatAspects: cur.noRepeatAspects !== false,
      noRepeatClasses: cur.noRepeatClasses === true,
      usedAspects: [], usedClasses: [], history: []
    });
    sessionsData.current = trimmed;
    saveSessions();
    renderSessionSelect();
    showResult(['press randomize to begin'], 'placeholder');
    updateStats();
    updateHistory();
  }

  function renameSession() {
    const session = getCurrentSession();
    const name = prompt('Rename session:', session.name);
    if (!name || !name.trim() || name.trim() === session.name) return;
    const trimmed = name.trim();
    if (sessionsData.list.some(s => s.name === trimmed)) {
      alert(`A session named "${trimmed}" already exists.`); return;
    }
    session.name = trimmed;
    sessionsData.current = trimmed;
    saveSessions();
    renderSessionSelect();
  }

  function deleteSession() {
    if (sessionsData.list.length <= 1) return;
    const session = getCurrentSession();
    if (!confirm(`Delete session "${session.name}"?\nThis cannot be undone.`)) return;
    sessionsData.list = sessionsData.list.filter(s => s.name !== session.name);
    sessionsData.current = sessionsData.list[0].name;
    saveSessions();
    renderSessionSelect();
    showResult(['press randomize to begin'], 'placeholder');
    updateStats();
    updateHistory();
  }

  // ── Toggle sync ─────────────────────────────────
  function syncToggles() {
    const s = getCurrentSession();
    document.getElementById('tog-aspects').checked = s.noRepeatAspects !== false;
    document.getElementById('tog-classes').checked = s.noRepeatClasses === true;
  }

  function onToggleChange() {
    const s = getCurrentSession();
    s.noRepeatAspects = document.getElementById('tog-aspects').checked;
    s.noRepeatClasses = document.getElementById('tog-classes').checked;
    saveSessions();
    updateStats();
  }

  // ── Actions ─────────────────────────────────────────
  function generate() {
    const l1 = getList('list1');
    const l2 = getList('list2');
    const c  = getConnector();
    const session = getCurrentSession();

    if (l1.length === 0 || l2.length === 0) {
      showResult(['add items to both lists first!'], 'error'); return;
    }

    const noA = session.noRepeatAspects !== false;
    const noC = session.noRepeatClasses === true;

    const usedASet = new Set(session.usedAspects);
    const usedCSet = new Set(session.usedClasses);
    const availA   = noA ? l2.filter(a => !usedASet.has(a)) : [...l2];
    const availC   = noC ? l1.filter(a => !usedCSet.has(a)) : [...l1];

    if (noA && availA.length === 0) {
      showResult(['all aspects used — reset or start a new session!'], 'error');
      updateStats(); return;
    }
    if (noC && availC.length === 0) {
      showResult(['all classes used — reset or start a new session!'], 'error');
      updateStats(); return;
    }

    const picks         = [];
    const pickedAspects = [];
    const pickedClasses = [];

    if (!noA && !noC) {
      // Fully random — no depletion
      const n = getCount();
      for (let i = 0; i < n; i++)
        picks.push(l1[Math.floor(Math.random() * l1.length)] + c + l2[Math.floor(Math.random() * l2.length)]);

    } else if (noA && !noC) {
      // Aspects constrained, classes free
      const n = Math.min(getCount(), availA.length);
      shuffle(availA).slice(0, n).forEach(aspect => {
        picks.push(l1[Math.floor(Math.random() * l1.length)] + c + aspect);
        pickedAspects.push(aspect);
      });

    } else if (!noA && noC) {
      // Classes constrained, aspects free
      const n = Math.min(getCount(), availC.length);
      shuffle(availC).slice(0, n).forEach(cls => {
        picks.push(cls + c + l2[Math.floor(Math.random() * l2.length)]);
        pickedClasses.push(cls);
      });

    } else {
      // Both constrained — shuffle each pool, zip into pairs
      const n  = Math.min(getCount(), availA.length, availC.length);
      const sA = shuffle(availA).slice(0, n);
      const sC = shuffle(availC).slice(0, n);
      for (let i = 0; i < n; i++) {
        picks.push(sC[i] + c + sA[i]);
        pickedAspects.push(sA[i]);
        pickedClasses.push(sC[i]);
      }
    }

    if (picks.length === 0) {
      showResult(['nothing available to generate!'], 'error'); return;
    }

    session.usedAspects.push(...pickedAspects);
    session.usedClasses.push(...pickedClasses);
    session.history.push(...picks);
    saveSessions();

    showResult(picks, null);
    updateStats();
    updateHistory();
  }

  function resetUsed() {
    const session = getCurrentSession();
    if (session.history.length === 0) return;
    const tracked = session.usedAspects.length + session.usedClasses.length;
    const msg = tracked > 0
      ? `Reset "${session.name}"?\nAll tracking and history will be cleared.`
      : `Clear history for "${session.name}"?`;
    if (!confirm(msg)) return;
    session.usedAspects = [];
    session.usedClasses = [];
    session.history     = [];
    saveSessions();
    showResult(['press randomize to begin'], 'placeholder');
    updateStats();
    updateHistory();
  }

  // ── Wire up list / connector / count changes ──────────────
  ['list1', 'list2'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      localStorage.setItem(KEYS[id], document.getElementById(id).value);
      updateStats();
    });
  });
  document.getElementById('connector').addEventListener('input', () => {
    localStorage.setItem(KEYS.connector, document.getElementById('connector').value);
    updateStats();
  });
  document.getElementById('count').addEventListener('input', () => {
    localStorage.setItem(KEYS.count, document.getElementById('count').value);
  });

  // ── Boot ────────────────────────────────────────────
  loadSessions();
  loadSettings();
  renderSessionSelect();
  syncToggles();
  updateStats();
  updateHistory();
</script>
</body>
</html>
